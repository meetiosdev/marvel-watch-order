<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marvel Cinematic Universe - Chronological Watch Order</title>
    <meta name="description" content="The ultimate chronological watch order for the Marvel Cinematic Universe, from the 1940s to the modern day.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
